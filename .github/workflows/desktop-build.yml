name: Desktop Build

# Cross-platform Tauri build for rez-chat. Triggered manually (smoke test)
# or by pushing a `v*` tag (cuts a draft GitHub Release with the artifacts
# plus the updater's latest.json).
#
# The repo is the standalone rez-chat. The four sibling Rez packages
# (rez-core, rez-sdk, rez-node, rez-ui) are checked out at sibling paths so
# rez-chat/package.json's `file:../<sibling>` deps resolve at npm-install
# time; `--install-links` copies them into node_modules as real directories
# so tauri.conf.json's bundle.resources entries can reach them.
#
# Required secrets:
#   TAURI_SIGNING_PRIVATE_KEY / TAURI_SIGNING_PRIVATE_KEY_PASSWORD
#       updater artifact signing — generate once with `tauri signer generate`
#       and commit ONLY the public key into src-tauri/tauri.conf.json.
#   APPLE_CERTIFICATE / APPLE_CERTIFICATE_PASSWORD / APPLE_SIGNING_IDENTITY
#   APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID
#       macOS code signing + notarization (same Developer ID material as the
#       Electron pipeline; APPLE_CERTIFICATE is the base64 .p12 previously
#       stored as CSC_LINK).
#
# NOTE (notarization): the bundled Node sidecar (externalBin) and
# better-sqlite3's .node files inside Resources must be signed as part of
# the bundle. tauri-action signs externalBin; if notarization rejects the
# nested .node binaries, add a signCommand hook here.

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout rez-chat
        uses: actions/checkout@v6
        with:
          path: rez-chat

      - name: Checkout rez-core
        uses: actions/checkout@v6
        with:
          repository: rezprotocol/rez-core
          path: rez-core
          ref: main

      - name: Checkout rez-sdk
        uses: actions/checkout@v6
        with:
          repository: rezprotocol/rez-sdk
          path: rez-sdk
          ref: main

      - name: Checkout rez-node
        uses: actions/checkout@v6
        with:
          repository: rezprotocol/rez-node
          path: rez-node
          ref: main

      - name: Checkout rez-ui
        uses: actions/checkout@v6
        with:
          repository: rezprotocol/rez-ui
          path: rez-ui
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22.x"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: rez-chat/src-tauri

      - name: Add Rust target for the pinned toolchain
        # dtolnay/rust-toolchain adds `targets` to `stable`, but
        # rez-chat/rust-toolchain.toml pins channel 1.89.0 — the toolchain the
        # build actually uses. Add the matrix target from rez-chat/ so the
        # toolchain-file override applies (otherwise cross-arch macOS legs fail
        # with "Target ... is not installed").
        run: rustup target add ${{ matrix.target }}
        working-directory: rez-chat

      - name: Install Linux webview dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libsecret-1-dev

      - name: Install rez-chat deps
        # `--install-links` copies the sibling `file:..` deps into
        # rez-chat/node_modules as real directories (not symlinks) so the
        # Tauri bundler's resources map can copy them into the app.
        run: npm install --install-links --no-audit --no-fund
        working-directory: rez-chat

      - name: Build web assets
        run: npm run desktop:build:web
        working-directory: rez-chat

      - name: Fetch sidecar Node binary
        run: node scripts/fetch-sidecar-node.mjs ${{ matrix.target }}
        working-directory: rez-chat

      - name: Build desktop (${{ matrix.target }})
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Developer ID Application cert (base64 .p12) + its password +
          # matching identity string. Distinct from the electron-builder
          # CSC_LINK secret, which holds an "Apple Development" cert that cannot
          # be notarized for outside-the-store distribution.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: rez-chat
          args: --target ${{ matrix.target }}
          # Tag builds publish to a draft release with updater JSON; manual
          # runs only produce artifacts.
          tagName: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/v') && format('Rez Chat {0}', github.ref_name) || '' }}
          releaseDraft: true
          includeUpdaterJson: true

      - name: Upload artifacts (manual runs)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@v7
        with:
          name: desktop-${{ matrix.target }}
          path: |
            rez-chat/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            rez-chat/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            rez-chat/src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            rez-chat/src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
          if-no-files-found: warn
