name: Desktop Build

# Cross-platform Electron build for rez-chat. Triggered manually (smoke test)
# or by pushing a `v*` tag (cuts a draft GitHub Release with the artifacts).
#
# The repo is the standalone rez-chat. The four sibling Rez packages
# (rez-core, rez-sdk, rez-node, rez-ui) are checked out at sibling paths so
# rez-chat/package.json's `file:../<sibling>` deps resolve at npm-install
# time, and so electron-builder.yml's `from: ../<sibling>` source-bundling
# entries reach them.

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout rez-chat
        uses: actions/checkout@v6
        with:
          path: rez-chat

      - name: Checkout rez-core
        uses: actions/checkout@v6
        with:
          repository: rezprotocol/rez-core
          path: rez-core
          ref: main

      - name: Checkout rez-sdk
        uses: actions/checkout@v6
        with:
          repository: rezprotocol/rez-sdk
          path: rez-sdk
          ref: main

      - name: Checkout rez-node
        uses: actions/checkout@v6
        with:
          repository: rezprotocol/rez-node
          path: rez-node
          ref: main

      - name: Checkout rez-ui
        uses: actions/checkout@v6
        with:
          repository: rezprotocol/rez-ui
          path: rez-ui
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22.x"

      - name: Install rez-chat deps
        # `--install-links` copies the sibling `file:..` deps into
        # rez-chat/node_modules as real directories (not symlinks) so
        # electron-builder can bundle them from inside the app root —
        # the asar packager rejects any `from:` path outside `directories.app`.
        run: npm install --install-links --no-audit --no-fund
        working-directory: rez-chat

      - name: Build web assets
        run: npm run desktop:build:web
        working-directory: rez-chat

      - name: Rebuild native modules for Electron target
        # better-sqlite3 ships prebuilds; refetch the one matching the
        # Electron version + this runner's platform/arch so electron-builder
        # bundles the right .node binary.
        run: npm run desktop:rebuild:native
        working-directory: rez-chat

      - name: Build desktop (${{ matrix.platform }})
        # Empty code-signing env vars trip electron-builder ("cannot resolve
        # '' as a file"). We pipe each secret through the env block, then
        # unset any that came in empty before invoking electron-builder.
        # The `shell: bash` directive applies on Windows too via Git Bash.
        shell: bash
        working-directory: rez-chat
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: |
          # Strip empty signing/notarization env vars. electron-builder
          # treats an empty CSC_LINK as "path '' doesn't exist" and aborts;
          # an unset CSC_LINK means "no certificate provided" → unsigned build.
          for var in APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID \
                     CSC_LINK CSC_KEY_PASSWORD WIN_CSC_LINK WIN_CSC_KEY_PASSWORD; do
            if [ -z "${!var}" ]; then
              unset "$var"
            fi
          done
          # Pin auto-discovery only on the unsigned path so electron-builder
          # doesn't try to use a runner-local keychain identity. When CSC_LINK
          # IS set, leave auto-discovery at its default (true) — that's what
          # tells electron-builder to use the cert it just imported from the
          # base64 blob; setting it to false here suppresses signing entirely.
          if [ -z "${CSC_LINK:-}" ]; then
            export CSC_IDENTITY_AUTO_DISCOVERY=false
          fi
          npx electron-builder --config electron-builder.yml --${{ matrix.platform }} --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: desktop-${{ matrix.platform }}
          path: |
            rez-chat/artifacts/rez-chat-desktop/*.dmg
            rez-chat/artifacts/rez-chat-desktop/*.zip
            rez-chat/artifacts/rez-chat-desktop/*.exe
            rez-chat/artifacts/rez-chat-desktop/*.AppImage
            rez-chat/artifacts/rez-chat-desktop/latest*.yml
          if-no-files-found: warn

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist

      - name: Create draft GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          generate_release_notes: true
          files: dist/**/*
