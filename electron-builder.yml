appId: com.rezprotocol.chat
productName: Rez Chat

directories:
  # rez-chat repo IS the app root. The four sibling Rez packages live at
  # ../rez-core, ../rez-sdk, ../rez-node, ../rez-ui (see the polyrepo
  # checkout pattern in .github/workflows/desktop-build.yml).
  app: .
  output: artifacts/rez-chat-desktop
  buildResources: build

files:
  - package.json
  - src/**/*
  - electron/**/*
  - artifacts/rez-chat/**/*
  # Cross-package source bundling. The four sibling Rez packages are
  # installed under rez-chat/node_modules via `npm install --install-links`
  # (CI does this; local dev should also use --install-links before packing).
  # That gives electron-builder real directories to bundle, all under the
  # app root.
  - from: node_modules/@rezprotocol/core
    to: node_modules/@rezprotocol/core
    filter:
      - src/**/*
      - package.json
  - from: node_modules/@rezprotocol/sdk
    to: node_modules/@rezprotocol/sdk
    filter:
      - src/**/*
      - package.json
  - from: node_modules/@rezprotocol/node
    to: node_modules/@rezprotocol/node
    filter:
      - src/**/*
      - package.json
  - from: node_modules/rez-ui
    to: node_modules/rez-ui
    filter:
      - src/**/*
      - package.json
  # npm-installed prod deps are picked up by electron-builder's automatic
  # production-dependency walk over package.json — we don't need explicit
  # `from:` entries for ws, better-sqlite3, electron-updater, etc. The
  # earlier monorepo config listed them because the root package.json had
  # no `dependencies` field (workspaces only) and the auto-walk found
  # nothing. The standalone rez-chat package.json has real `dependencies`,
  # so auto-resolution works. Adding explicit entries on top caused the
  # asar packer to attempt linking better_sqlite3.node twice → EEXIST.
  - "!**/test/**"
  - "!**/tests/**"
  - "!**/.claude/**"
  - "!**/docs/**"
  - "!**/*.log"

extraMetadata:
  name: rez-chat
  description: Rez Chat desktop app
  author: Rez Protocol
  main: electron/main.mjs

# Auto-update publish target (rezprotocol/rez-chat GitHub Releases).
# electron-updater reads this at runtime to know which repo to poll for
# `latest-mac.yml` / `latest.yml` / `latest-linux.yml` metadata.
publish:
  provider: github
  owner: rezprotocol
  repo: rez-chat
  releaseType: release
  vPrefixedTagName: true

asar: true
asarUnpack:
  - electron/preload.cjs
  # Match every native .node binary once. Listing
  # node_modules/better-sqlite3/**/*.node separately caused electron-builder
  # to attempt linking better_sqlite3.node twice and fail with EEXIST.
  - node_modules/**/*.node
# electron-builder's host-platform npm rebuild would overwrite the prebuild
# we deliberately installed for the target platform/arch via
# scripts/desktop-native-modules.mjs. The desktop:pack:<platform> scripts
# (and CI) install the correct better-sqlite3 prebuild before electron-builder
# runs. better-sqlite3 is the only native module we ship; the other listed
# deps (bindings, file-uri-to-path, ws) are pure JS.
npmRebuild: false
electronVersion: 31.7.7

mac:
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # Code signing + notarization are driven by environment variables — nothing
  # about a specific Apple developer identity lives in source. Set on your
  # machine (or in CI secrets) before building a release:
  #   CSC_NAME                       — keychain identity (e.g. "Your Name (TEAMID)")
  #   APPLE_ID                       — Apple ID email
  #   APPLE_APP_SPECIFIC_PASSWORD    — app-specific password (appleid.apple.com)
  #   APPLE_TEAM_ID                  — Apple developer team ID (when set,
  #                                    electron-builder auto-enables notarytool)
  # Without notarization, electron-updater's staged binary is blocked by
  # Gatekeeper on macOS 10.15+ and the auto-update silently fails to install.
  # Forks without Apple credentials should set CSC_IDENTITY_AUTO_DISCOVERY=false
  # to produce an unsigned dev build.
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  category: public.app-category.social-networking

win:
  target:
    - target: nsis
      arch:
        - x64
    - target: zip
      arch:
        - x64

linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: zip
      arch:
        - x64
  category: Network;Chat;InstantMessaging
